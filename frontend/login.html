<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — SmartInv</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c10;
            --surface: #111318;
            --surface2: #181b22;
            --border: #1e222d;
            --border2: #252a38;
            --accent: #4ade80;
            --accent2: #22c55e;
            --accent-dim: rgba(74, 222, 128, 0.08);
            --accent-glow: rgba(74, 222, 128, 0.2);
            --text: #f0f2f5;
            --text2: #8892a4;
            --text3: #4a5568;
            --red: #f87171;
            --red-dim: rgba(248, 113, 113, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(74,222,128,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74,222,128,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* Glow blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            opacity: 0.5;
        }
        .blob-1 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(74,222,128,0.15), transparent 70%);
            top: -100px; left: -100px;
        }
        .blob-2 {
            width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(96,165,250,0.1), transparent 70%);
            bottom: -80px; right: -80px;
        }

        .card {
            position: relative;
            z-index: 1;
            display: flex;
            width: 820px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            animation: cardIn 0.5s cubic-bezier(0.34, 1.2, 0.64, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* LEFT PANEL */
        .left {
            width: 42%;
            background: linear-gradient(145deg, #0f1a14 0%, #0d1410 100%);
            border-right: 1px solid var(--border);
            padding: 48px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .left::before {
            content: '';
            position: absolute;
            top: -60px; left: -60px;
            width: 250px; height: 250px;
            background: radial-gradient(circle, rgba(74,222,128,0.12), transparent 70%);
            pointer-events: none;
        }

        .left-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            width: 36px; height: 36px;
            background: var(--accent);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }

        .brand-name {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .brand-name span { color: var(--accent); }

        .left-body { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 32px 0; }

        .left-headline {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -1px;
            margin-bottom: 12px;
        }

        .left-headline span { color: var(--accent); }

        .left-sub {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: var(--text1);
            line-height: 1.7;
            margin-bottom: 28px;
        }

        .feature-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: rgba(74,222,128,0.06);
            border: 1px solid rgba(74,222,128,0.12);
            border-radius: 10px;
            font-size: 13px;
            color: var(--text1);
        }

        .feature-dot {
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .left-footer {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--text1);
            letter-spacing: 0.5px;
        }

        /* RIGHT PANEL */
        .right {
            flex: 1;
            padding: 48px 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-tag {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .form-title {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.8px;
            margin-bottom: 4px;
        }

        .form-sub {
            font-size: 13px;
            color: var(--text2);
            margin-bottom: 32px;
            font-family: 'DM Mono', monospace;
        }

        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--text1);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 7px;
        }

        .field input {
            width: 100%;
            padding: 11px 16px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 9px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            outline: none;
            transition: all 0.2s;
        }

        .field input:focus {
            border-color: var(--accent);
            background: rgba(74,222,128,0.04);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .field input::placeholder { color: var(--text2); }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #0a0c10;
            border: none;
            border-radius: 9px;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
            margin-top: 4px;
        }

        .submit-btn:hover {
            background: var(--accent2);
            transform: translateY(-1px);
            box-shadow: 0 6px 24px var(--accent-glow);
        }

        .submit-btn:active { transform: translateY(0); }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--text2);
        }

        .secondary-btn {
            width: 100%;
            padding: 11px;
            background: transparent;
            color: var(--accent);
            border: 1px solid rgba(74,222,128,0.3);
            border-radius: 9px;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .secondary-btn:hover {
            background: var(--accent-dim);
            border-color: var(--accent);
        }

        /* ERROR */
        .error-msg {
            display: none;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--red);
            background: var(--red-dim);
            border: 1px solid rgba(248,113,113,0.2);
            border-radius: 7px;
            padding: 9px 13px;
            margin-bottom: 14px;
        }

        .error-msg.show { display: block; animation: shake 0.3s ease; }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="card">
    <!-- LEFT -->
    <div class="left">
        <div class="left-brand">
            <div class="brand-icon">📦</div>
            <div class="brand-name">Smart<span>Inv</span></div>
        </div>

        <div class="left-body">
            <div class="left-headline">Cloud Ready Inventory <br><span>and Invoice Management System.</span></div>
            <div class="left-sub"> Stock • Billing • Khata<br> All in one place</div>
            <div class="feature-list">
                <div class="feature"><span class="feature-dot"></span>Real-time stock tracking</div>
                <div class="feature"><span class="feature-dot"></span>GST-ready invoicing</div>
                <div class="feature"><span class="feature-dot"></span>Udhar / Khata system</div>
            </div>
        </div>

        <div class="left-footer">v1.0 · SmartInv</div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="form-title">Welcome back</div>
        <div class="form-sub">Sign in to your account to continue</div>

        <div class="error-msg" id="errorMsg">⚠ Invalid username or password</div>

        <div class="field">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter your username">
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>

        <button class="submit-btn" onclick="login()">Login →</button>

        <div class="divider"><span>or</span></div>

        <button class="secondary-btn" onclick="goSignup()">Create an Account</button>
    </div>
</div>

<script>
    async function login() {
        const user = document.getElementById("username").value.trim();
        const pass = document.getElementById("password").value;

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });
            const data = await res.json();

            if (res.ok && data.success) {
                localStorage.setItem("loggedIn",    "true");
                localStorage.setItem("currentUser", user);
                localStorage.setItem("shopName",    data.shopName    || "");
                localStorage.setItem("shopPhone",   data.shopPhone   || "");
                localStorage.setItem("shopAddress", data.shopAddress || "");
                localStorage.setItem("shopGst",     data.shopGst     || "");
                window.location.href = "dashboard.html";
            } else {
                const err = document.getElementById("errorMsg");
                err.classList.remove("show");
                void err.offsetWidth;
                err.classList.add("show");
            }
        } catch (e) {
            const err = document.getElementById("errorMsg");
            err.classList.remove("show");
            void err.offsetWidth;
            err.classList.add("show");
        }
    }

    document.addEventListener("keydown", e => {
        if (e.key === "Enter") login();
    });

    function goSignup() { window.location.href = "signup.html"; }
</script>
</body>
</html>
